name: Build Fabric Mod

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build:
    name: Build Mod
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repo
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Set up JDK 22
      - name: Set up Java 22
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 22

      # 3. Cache Gradle dependencies
      - name: Cache Gradle
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper/
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      # 4. Build mod using Gradle GitHub Action (no wrapper needed)
      - name: Build Mod
        uses: gradle/gradle-build-action@v2
        with:
          arguments: clean build
          java-version: 22

      # 5. Upload build artifacts (mods and jars)
      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mod-jars
          path: build/libs/*.jar
