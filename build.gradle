plugins {
    id 'fabric-loom' version '1.6.11'
    id 'maven-publish'
}

group = 'com.example'
version = '1.0.0'
archivesBaseName = 'tweaksmod'

repositories {
    maven { url 'https://maven.fabricmc.net/' }

    maven { url 'https://maven.terraformersmc.com/releases/' } // required for ModMenu

    maven { url 'https://maven.shedaniel.me/' }

    mavenCentral()
}

dependencies {
    minecraft "com.mojang:minecraft:1.21.1"
    mappings "net.fabricmc:yarn:1.21.1+build.1:v2"
    modImplementation "net.fabricmc:fabric-loader:0.16.7"

    modImplementation "net.fabricmc.fabric-api:fabric-api:0.102.0+1.21.1"
    modImplementation "me.shedaniel.cloth:cloth-config-fabric:13.0.121"
    modImplementation "com.terraformersmc:modmenu:11.0.2"
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

tasks.withType(JavaCompile).configureEach {
    it.options.release = 21
}
