name: Build TweaksMod

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout the repository
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2. Set up Java 22
      - name: Set up Java 22
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 22

      # 3. Set up Gradle 8.10
      - name: Set up Gradle
        uses: gradle/gradle-build-action@v2
        with:
          gradle-version: 8.10

      # 4. Cache Gradle dependencies
      - name: Cache Gradle packages
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      # 5. Clean and build the mod
      - name: Build Mod
        run: ./gradlew clean build --no-daemon

      # 6. Upload build artifacts (v4)
      - name: Upload Mod Jar
        uses: actions/upload-artifact@v4
        with:
          name: TweaksMod-Jar
          path: build/libs/*.jar
