plugins {
    id 'fabric-loom' version '1.6.11'
    id 'maven-publish'
}

group = 'com.example'
version = '1.0.0'
archivesBaseName = 'tweaksmod'

repositories {
    maven { url 'https://maven.fabricmc.net/' }

    maven { url 'https://maven.terraformersmc.com/releases/' } // required for ModMenu

    maven { url 'https://maven.shedaniel.me/' }

    mavenCentral()
}

dependencies {
    minecraft "com.mojang:minecraft:1.21.11"
    mappings loom.officialMojangMappings() // use Mojang mappings
    modImplementation "net.fabricmc:fabric-loader:0.18.4"
    modImplementation "net.fabricmc.fabric-api:fabric-api:0.141.3+1.21.11"

    // Config UI
    modImplementation "com.terraformersmc:modmenu:17.0.0-beta.2"
    modImplementation "me.shedaniel.cloth:cloth-config-fabric:21.11.153"
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

tasks.withType(JavaCompile).configureEach {
    it.options.release = 21
}
