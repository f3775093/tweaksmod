name: Build TweaksMod

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:

    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Setup JDK 21
      uses: actions/setup-java@v3
      with:
        distribution: temurin
        java-version: 21

    - name: Cache Gradle
      uses: actions/cache@v3
      with:
        path: |
          ~/.gradle/caches/
          ~/.gradle/wrapper/
        key: ${{ runner.os }}-gradle-cache

    - name: Install Gradle 9
      run: |
        sudo apt update
        sudo apt install -y unzip
        wget https://services.gradle.org/distributions/gradle-9.4-bin.zip -O /tmp/gradle.zip
        unzip -d ~/gradle /tmp/gradle.zip
      # Make gradle available on PATH
    - name: Add Gradle to PATH
      run: echo "$HOME/gradle/gradle-9.4/bin" >> $GITHUB_PATH

    - name: Build Mod
      run: gradle clean build --no-daemon --stacktrace

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: TweaksMod-JAR
        path: build/libs/*.jar
